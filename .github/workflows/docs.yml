name: Docs

# Build the Astro/Starlight docs site (website/) and deploy it straight to
# GitHub Pages — no gh-pages branch. Requires repo Settings → Pages →
# Build and deployment → Source: "GitHub Actions" (already configured).
# Served at https://kinoshita-electronics-consortium.github.io/kec-lisp/
#
# The build job also runs on pull requests that touch docs/ or website/, so
# bad frontmatter fails on the PR instead of only after merge (the language
# CI never touches website/ — this used to be a blind spot). Deploy stays
# push-to-main only.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          path: ./website
          node-version: 22

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Allow one concurrent deployment; don't cancel an in-progress one.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
